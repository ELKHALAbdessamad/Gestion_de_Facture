<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargement Facture - NovaFact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #080807 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #D4A853, #F4D03F);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            color: #080807;
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.3);
        }
        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            color: #D4A853;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .invoice-number {
            color: #D4A853;
            font-size: 24px;
            font-weight: 800;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(212, 168, 83, 0.5);
        }
        .details {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 15px;
        }
        .detail-label {
            color: rgba(255, 255, 255, 0.6);
        }
        .detail-value {
            font-weight: 700;
            color: #fff;
        }
        .download-btn {
            background: linear-gradient(135deg, #D4A853, #F4D03F);
            color: #080807;
            border: none;
            padding: 18px 45px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.4);
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 168, 83, 0.6);
        }
        .download-btn:active {
            transform: translateY(-1px);
        }
        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading {
            color: rgba(255, 255, 255, 0.7);
            margin: 20px 0;
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .spinner {
            border: 3px solid rgba(212, 168, 83, 0.1);
            border-top: 3px solid #D4A853;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .powered-by {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }
        .powered-by strong {
            color: #D4A853;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">NF</div>
        <h1>NovaFact</h1>
        <p class="subtitle">Téléchargement de Facture</p>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Chargement de la facture...</p>
        </div>
        
        <div id="content" style="display: none;">
            <div class="invoice-number" id="invoiceNumber"></div>
            
            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">📋 Client</span>
                    <span class="detail-value" id="clientName"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📅 Date</span>
                    <span class="detail-value" id="invoiceDate"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">💰 Montant TTC</span>
                    <span class="detail-value" id="totalAmount"></span>
                </div>
            </div>
            
            <button class="download-btn" onclick="downloadPDF()">
                📥 Télécharger le PDF
            </button>
            
            <div class="powered-by">
                Powered by <strong>NovaFact</strong>
            </div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script>
        let factureData = null;
        
        // Logo NovaFact en base64 (copié depuis logoLoader.js)
        const logoBase64 = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAYAAACtWK6eAAAACXBIWXMAAAsTAAALEwEAmpwYAAABNmlDQ1BpY2MAABiVY2BgMnB0cXJlEmBgyM0rKQpyd1KIiIxSYD/PwMbAzAAGicnFBY4BAT4gdl5+XioDBvh+qXgYMoUQW4CMPgYg+zUD/////8K1AwODvP///3////8PUPkZmMwBcgVBegC8r7AwMEhRREhXQjbyCFSDKHPnmLBgYGRgYOBKKUlNYWBgYE9HyGZnVxYW5mbmZlEQMzAzAAAAALMLB0NDQ0MAAACRSUQBSTY1NwAAAABbAAAAAAAAFSwBAAAAAAAAAQAAAAB';
        
        // Extraire l'ID depuis l'URL
        const pathParts = window.location.pathname.split('/');
        const invoiceId = pathParts[pathParts.length - 1];
        
        // Charger les données de la facture
        async function loadInvoice() {
            try {
                const response = await fetch(`/api/factures/download/${invoiceId}`);
                
                if (!response.ok) {
                    throw new Error('Facture introuvable');
                }
                
                const data = await response.json();
                factureData = data;
                
                // Afficher les informations
                document.getElementById('invoiceNumber').textContent = data.facture.numero;
                document.getElementById('clientName').textContent = data.client?.nom || 'N/A';
                document.getElementById('invoiceDate').textContent = new Date(data.facture.date_creation).toLocaleDateString('fr-FR');
                document.getElementById('totalAmount').textContent = `${data.facture.total_ttc.toFixed(2)} ${data.facture.devise || 'MAD'}`;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `❌ Erreur: ${error.message}`;
            }
        }
        
        // Générer le PDF (EXACTEMENT comme pdfGenerator.js SANS QR CODE)
        function downloadPDF() {
            if (!factureData) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const facture = factureData.facture;
            const client = factureData.client;
            const parametres = factureData.parametres || {};
            
            // Couleurs
            const gold = [212, 168, 83];
            const dark = [8, 8, 7];
            const gray = [200, 200, 200];
            
            const devise = facture.devise || 'MAD';
            const fmt = (n) => `${(n || 0).toFixed(2)} ${devise}`;
            
            // Bordure dorée supérieure
            doc.setDrawColor(...gold);
            doc.setLineWidth(3);
            doc.line(10, 10, 200, 10);
            
            // Logo NovaFact
            if (logoBase64) {
                doc.setFillColor(255, 255, 255);
                doc.rect(12, 13, 22, 22, 'F');
                try {
                    doc.addImage(logoBase64, 'PNG', 12, 13, 22, 22);
                } catch (e) {
                    console.log('Logo skip');
                }
            }
            
            // Nom entreprise
            doc.setFontSize(16);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(...gold);
            doc.text(parametres.nom_entreprise || 'NovaFact', 38, 22);
            
            // Coordonnées entreprise
            doc.setFontSize(8);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(80, 80, 80);
            let yInfo = 28;
            if (parametres.adresse) { doc.text(parametres.adresse, 38, yInfo); yInfo += 4.5; }
            if (parametres.code_postal || parametres.ville) {
                doc.text(`${parametres.code_postal || ''} ${parametres.ville || ''}`.trim(), 38, yInfo);
                yInfo += 4.5;
            }
            if (parametres.telephone) { doc.text(`Tél: ${parametres.telephone}`, 38, yInfo); yInfo += 4.5; }
            if (parametres.email) { doc.text(`Email: ${parametres.email}`, 38, yInfo); yInfo += 4.5; }
            if (parametres.siret) { doc.text(`RC: ${parametres.siret}`, 38, yInfo); }
            
            // Bloc client
            doc.setDrawColor(...gray);
            doc.setLineWidth(0.5);
            doc.rect(130, 13, 68, 35);
            
            doc.setFontSize(9);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(...dark);
            doc.text('FACTURÉ À :', 134, 21);
            
            doc.setFontSize(8.5);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(60, 60, 60);
            let clientY = 28;
            if (client) {
                doc.text(client.nom || '', 134, clientY); clientY += 5;
                if (client.adresse) { doc.text(client.adresse, 134, clientY); clientY += 5; }
                if (client.tel) { doc.text(`Tél: ${client.tel}`, 134, clientY); clientY += 5; }
                if (client.email) { doc.text(client.email, 134, clientY); }
            }
            
            // Titre FACTURE
            doc.setFontSize(22);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(...gold);
            doc.text('FACTURE', 15, 58);
            
            // Infos facture
            doc.setFillColor(245, 245, 245);
            doc.rect(15, 62, 180, 18, 'F');
            
            doc.setFontSize(10);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(...dark);
            doc.text(`N° ${facture.numero}`, 20, 70);
            
            doc.setFont(undefined, 'normal');
            doc.text(`Date : ${new Date(facture.date_creation).toLocaleDateString('fr-FR')}`, 20, 77);
            
            if (facture.date_echeance) {
                doc.text(`Échéance : ${new Date(facture.date_echeance).toLocaleDateString('fr-FR')}`, 90, 77);
            }
            
            // Statut
            doc.setTextColor(0, 0, 0);
            doc.setFont(undefined, 'bold');
            doc.text(`Statut : ${facture.statut}`, 155, 70);
            
            // Tableau articles
            const tableData = (facture.articles || []).map(item => {
                const qty = parseFloat(item.quantite) || 0;
                const pu = parseFloat(item.prix_unitaire) || 0;
                const rem = parseFloat(item.remise) || 0;
                const tot = qty * pu * (1 - rem / 100);
                return [
                    item.designation || item.description || '-',
                    qty.toString(),
                    `${pu.toFixed(2)} ${devise}`,
                    rem > 0 ? `${rem}%` : '-',
                    `${(item.tva || 20)}%`,
                    `${tot.toFixed(2)} ${devise}`
                ];
            });
            
            doc.autoTable({
                startY: 84,
                head: [['Désignation', 'Qté', 'Prix Unit.', 'Remise', 'TVA', 'Total HT']],
                body: tableData,
                theme: 'striped',
                headStyles: {
                    fillColor: gold,
                    textColor: [255, 255, 255],
                    fontSize: 8,
                    fontStyle: 'bold',
                    halign: 'center',
                    cellPadding: 2
                },
                bodyStyles: { fontSize: 7.5, textColor: [40, 40, 40], cellPadding: 2 },
                columnStyles: {
                    0: { cellWidth: 65, halign: 'left' },
                    1: { cellWidth: 15, halign: 'center' },
                    2: { cellWidth: 28, halign: 'right' },
                    3: { cellWidth: 20, halign: 'center' },
                    4: { cellWidth: 15, halign: 'center' },
                    5: { cellWidth: 28, halign: 'right' }
                },
                alternateRowStyles: { fillColor: [248, 248, 248] },
                margin: { left: 15, right: 15 }
            });
            
            // Totaux
            let y = (doc.previousAutoTable?.finalY || 140) + 6;
            const totalsHeight = facture.remise_globale > 0 ? 40 : 28;
            doc.setFillColor(245, 245, 245);
            doc.rect(110, y, 85, totalsHeight, 'F');
            
            doc.setFontSize(8);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(60, 60, 60);
            
            doc.text('Total HT :', 115, y + 6);
            doc.text(fmt(facture.total_ht), 192, y + 6, { align: 'right' });
            
            if (facture.remise_globale > 0) {
                doc.setTextColor(239, 68, 68);
                doc.text(`Remise globale (${facture.remise_globale}%) :`, 115, y + 12);
                doc.text(`-${fmt(facture.remise_montant)}`, 192, y + 12, { align: 'right' });
                
                doc.setTextColor(60, 60, 60);
                doc.text('Après remise :', 115, y + 18);
                doc.text(fmt(facture.total_apres_remise), 192, y + 18, { align: 'right' });
            }
            
            const tvay = facture.remise_globale > 0 ? y + 24 : y + 12;
            doc.text('TVA :', 115, tvay);
            doc.text(fmt(facture.tva), 192, tvay, { align: 'right' });
            
            const ttcy = tvay + 7;
            doc.setFont(undefined, 'bold');
            doc.setFontSize(10);
            doc.setTextColor(...gold);
            doc.text('Total TTC :', 115, ttcy);
            doc.text(fmt(facture.total_ttc), 192, ttcy, { align: 'right' });
            
            // Infos paiement + Signature
            y = y + totalsHeight + 8;
            let leftY = y;
            
            if (facture.mode_paiement || facture.type_virement || facture.date_depot || facture.date_encaissement) {
                doc.setFontSize(8);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(...dark);
                doc.text('Informations de paiement', 15, leftY);
                
                doc.setFontSize(7);
                doc.setFont(undefined, 'normal');
                doc.setTextColor(60, 60, 60);
                leftY += 4;
                if (facture.mode_paiement) { doc.text(`Mode : ${facture.mode_paiement}`, 15, leftY); leftY += 4; }
                if (facture.type_virement) { doc.text(`Type virement : ${facture.type_virement}`, 15, leftY); leftY += 4; }
                if (facture.date_depot) { doc.text(`Dépôt : ${new Date(facture.date_depot).toLocaleDateString('fr-FR')}`, 15, leftY); leftY += 4; }
                if (facture.date_encaissement) { doc.text(`Encaissement : ${new Date(facture.date_encaissement).toLocaleDateString('fr-FR')}`, 15, leftY); leftY += 4; }
                leftY += 3;
            }
            
            // Signature
            if (facture.signature) {
                doc.setFontSize(8);
                doc.setFont(undefined, 'bold');
                doc.setTextColor(...dark);
                doc.text('Signature', 15, leftY);
                
                try {
                    doc.addImage(facture.signature, 'PNG', 15, leftY + 2, 50, 16);
                } catch (e) {
                    console.log('Signature skip');
                }
                
                doc.setDrawColor(...gray);
                doc.setLineWidth(0.2);
                doc.line(15, leftY + 19, 65, leftY + 19);
                doc.setFontSize(6);
                doc.setFont(undefined, 'italic');
                doc.setTextColor(120, 120, 120);
                doc.text('Signature numérique', 15, leftY + 23);
            }
            
            // Conditions de paiement (sans QR code)
            doc.setFontSize(7);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(...dark);
            doc.text('Conditions de paiement', 110, y);
            
            doc.setFontSize(6.5);
            doc.setFont(undefined, 'normal');
            doc.setTextColor(80, 80, 80);
            const termsText = "Paiement à réception · Pénalités de retard : 3× le taux légal · Indemnité forfaitaire : 40 MAD";
            const splitTerms = doc.splitTextToSize(termsText, 85);
            doc.text(splitTerms, 110, y + 4);
            
            // Pied de page
            doc.setDrawColor(...gold);
            doc.setLineWidth(0.8);
            doc.line(15, 270, 195, 270);
            
            doc.setFontSize(6.5);
            doc.setFont(undefined, 'italic');
            doc.setTextColor(120, 120, 120);
            doc.text('Merci de votre confiance', 105, 275, { align: 'center' });
            doc.text('Document téléchargé via QR Code', 105, 280, { align: 'center' });
            
            // Télécharger
            doc.save(`Facture_${facture.numero}.pdf`);
        }
        
        // Charger automatiquement au démarrage
        loadInvoice();
    </script>
</body>
</html>
