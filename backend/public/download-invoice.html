<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargement Facture - NovaFact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="/download-invoice.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #080807 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #D4A853, #F4D03F);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            color: #080807;
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.3);
        }
        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            color: #D4A853;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .invoice-number {
            color: #D4A853;
            font-size: 24px;
            font-weight: 800;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(212, 168, 83, 0.5);
        }
        .details {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 15px;
        }
        .detail-label {
            color: rgba(255, 255, 255, 0.6);
        }
        .detail-value {
            font-weight: 700;
            color: #fff;
        }
        .download-btn {
            background: linear-gradient(135deg, #D4A853, #F4D03F);
            color: #080807;
            border: none;
            padding: 18px 45px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(212, 168, 83, 0.4);
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 168, 83, 0.6);
        }
        .download-btn:active {
            transform: translateY(-1px);
        }
        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .loading {
            color: rgba(255, 255, 255, 0.7);
            margin: 20px 0;
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .spinner {
            border: 3px solid rgba(212, 168, 83, 0.1);
            border-top: 3px solid #D4A853;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .powered-by {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }
        .powered-by strong {
            color: #D4A853;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">NF</div>
        <h1>NovaFact</h1>
        <p class="subtitle">Téléchargement de Facture</p>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Chargement de la facture...</p>
        </div>
        
        <div id="content" style="display: none;">
            <div class="invoice-number" id="invoiceNumber"></div>
            
            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">📋 Client</span>
                    <span class="detail-value" id="clientName"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📅 Date</span>
                    <span class="detail-value" id="invoiceDate"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">💰 Montant TTC</span>
                    <span class="detail-value" id="totalAmount"></span>
                </div>
            </div>
            
            <button class="download-btn" onclick="downloadPDF()">
                📥 Télécharger le PDF
            </button>
            
            <div class="powered-by">
                Powered by <strong>NovaFact</strong>
            </div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>
</body>
</html>
